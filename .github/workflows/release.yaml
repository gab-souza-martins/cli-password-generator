name: Python Application CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: "3.13"
          
      - name: Install test dependencies
        run: |
          pip install pytest
              
      - name: Run tests
        run: |
          pytest generator.py

      - name: Lint with flake8
        run: |
          pip install flake8 
          flake8 .
